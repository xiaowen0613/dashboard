<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>成都上门二组 · 数据看板</title>
<script src="cq_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f4f5f7;color:#1d2129;font-size:13px;padding:16px}
.hd{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:18px 20px;border-radius:10px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.hd h1{font-size:18px;font-weight:600}.hd .dt{font-size:12px;opacity:.7}
.cb{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.cb select{padding:6px 10px;border:1px solid #d9dae3;border-radius:6px;font-size:13px;background:#fff;min-width:140px}
.qj{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.qj a{text-decoration:none;color:#fff;background:#4e6af5;padding:4px 10px;border-radius:4px;font-size:11px;white-space:nowrap}
.qj a:hover{opacity:.8}
.qj a.r{background:#f53f3f}.qj a.o{background:#ff7d00}.qj a.g{background:#00b42a}
.sec{margin-bottom:12px}
.sec h2{font-size:14px;color:#1d2129;padding:6px 0;border-bottom:2px solid #4e6af5;margin-bottom:8px}
.warn{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px;border-left:3px solid #f53f3f}
.warn h3{font-size:13px;color:#f53f3f;margin-bottom:6px}
.wi{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.ic{background:#fff8f8;border-radius:6px;padding:10px;border:1px solid #ffe0e0}
.ic .tl{font-size:12px;font-weight:600;color:#1d2129;margin-bottom:4px}
.ic .row{display:flex;justify-content:space-between;font-size:11px;color:#666;margin:2px 0}
.ic .row .v{font-weight:600}.ic .row .v.r{color:#f53f3f}.ic .row .v.g{color:#00b42a}
.ic .sg{font-size:10px;color:#888;margin-top:4px;padding-top:4px;border-top:1px solid #f0f0f0}
.tw{overflow:auto;border:1px solid #e8e8e8;border-radius:8px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f7f8fa;padding:5px 6px;text-align:left;font-weight:600;color:#4e5969;border-bottom:2px solid #e8e8e8;font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:4px 6px;border-bottom:1px solid #f2f3f5;font-size:11px;white-space:nowrap}
tr:hover td{background:#f7f8fa}
.bg{r,background:#fff0f0}.bg g{background:#f0fff0}
.sb{display:inline-block;background:#e8e8e8;border-radius:3px;height:14px;width:50px;overflow:hidden;vertical-align:middle;margin-right:3px}
.sf{height:100%;border-radius:3px;transition:width .3s}
</style>
</head><body>

<div class="hd">
  <div><h1>📊 成都上门二组 · 数据看板</h1></div>
  <div class="dt">最新数据: <span id="latestDate"></span> · <span id="empCount"></span></div>
</div>

<div class="cb">
  <select id="es" onchange="rf()"><option value="__all__">全部员工</option></select>
  <span style="font-size:12px;color:#888">已筛选: <span id="selName">全部</span></span>
</div>

<div class="qj" id="qj"></div>

<div class="sec" id="warnSection">
  <h2>🚨 急需改善</h2>
  <div id="warnList"></div>
</div>

<div class="sec">
  <h2>📋 全部指标明细</h2>
  <div class="tw"><table><thead id="thr"></thead><tbody id="tbd"></tbody></table></div>
</div>

<script>
document.getElementById("latestDate").textContent = ED;
document.getElementById("empCount").textContent = EC + "名员工";

NAMES.forEach(function(n){
  var o = document.createElement("option"); o.value = n; o.textContent = n;
  document.getElementById("es").appendChild(o);
});

// 指标定义：名称, 字段名, 目标, 目标方向(low=越低越好/high=越高越好), 分类
var METRICS = [
  // 催单率类
  {n:"催单率-考核",f:"催单率-考核",t:2,d:"low",c:"催单率"},
  {n:"上门超时客诉率",f:"上门超时客诉率",t:0,d:"low",c:"客诉质量"},
  {n:"上门整体客诉率",f:"上门整体客诉率",t:2,d:"low",c:"客诉质量"},
  // 跟进及时率
  {n:"跟进及时率-全渠道",f:"跟进及时率-全渠道",t:95,d:"high",c:"服务质量"},
  {n:"企微回复及时率-直营",f:"企微回复及时率-直营",t:85,d:"high",c:"服务质量"},
  {n:"工单30min回复及时率",f:"工单30min回复及时率",t:90,d:"high",c:"服务质量"},
  // 加单
  {n:"加单率",f:"加单率",t:8.5,d:"high",c:"加单"},
  {n:"加单金额",f:"加单金额",t:1000,d:"high",c:"加单"},
  {n:"3C加单率",f:"3C加单率",t:8.5,d:"high",c:"加单"},
  // 履约
  {n:"京东一站换新履约及时率",f:"京东一站换新履约及时率",t:92.5,d:"high",c:"一站式"},
  {n:"京东一站换新取货及时率",f:"京东一站换新取货及时率",t:96,d:"high",c:"一站式"},
  {n:"京东一站换新跟进及时率",f:"京东一站换新跟进及时率",t:98,d:"high",c:"一站式"},
  {n:"一站换新旧机收货成交率",f:"一站换新旧机收货成交率",t:88,d:"high",c:"一站式"},
  // ETA
  {n:"3C直营非一站换新ETA履约准时率",f:"3C直营非一站换新ETA履约准时率",t:98,d:"high",c:"ETA"},
  {n:"多品类ETA履约准时率",f:"多品类ETA履约准时率",t:98,d:"high",c:"ETA"},
  // 交付
  {n:"交付用户添加率",f:"交付用户添加率",t:88,d:"high",c:"交付"},
  {n:"员工服务分-直营",f:"员工服务分-直营",t:4.5,d:"high",c:"服务质量"},
  // 3C业务
  {n:"3C成交人效",f:"3C成交人效",t:10,d:"high",c:"3C业务"},
  {n:"3C上门提交成交率",f:"3C上门提交成交率-用户维度(非一站换新)",t:78,d:"high",c:"3C业务"},
  // 利润
  {n:"质检准确率",f:"质检准确率",t:95,d:"high",c:"利润"},
  {n:"损失额率",f:"损失额率",t:1,d:"low",c:"利润"},
  {n:"入库及时率",f:"入库及时率",t:95,d:"high",c:"利润"},
  {n:"隐私清除率",f:"隐私清除率",t:95,d:"high",c:"利润"},
  {n:"议价费率",f:"议价费率",t:2,d:"low",c:"利润"},
  {n:"竞争追价费率",f:"竞争追价费率",t:2,d:"low",c:"利润"}
];

var GROUPS = {};
METRICS.forEach(function(m){
  if(!GROUPS[m.c])GROUPS[m.c]=[];
  GROUPS[m.c].push(m);
});

// 快速跳转
var qjHtml = "";
Object.keys(GROUPS).forEach(function(g){
  qjHtml += '<a href="#s-'+g+'">'+g+'</a>';
});
document.getElementById("qj").innerHTML = qjHtml;

function nv(v){if(v===null||v===undefined)return null;var n=parseFloat(v);return isNaN(n)?null:n;}

function getRows(){
  var s=document.getElementById("es").value;
  if(s==="__all__"||!s)return RAW;
  return RAW.filter(function(x){return x["员工姓名"]===s;});
}

function avg(rows,m){
  var vals=rows.map(function(r){return nv(r[m]);}).filter(function(v){return v!==null;});
  return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;
}

function rf(){
  var rows=getRows();
  var s=document.getElementById("es").value;
  document.getElementById("selName").textContent = (s==="__all__"||!s)?"全部":s;
  
  // 快速跳转行
  var qjHtml = "";
  Object.keys(GROUPS).forEach(function(g){
    var warnCount = 0;
    GROUPS[g].forEach(function(m){
      var a=avg(rows,m.f);if(a===null)return;
      var rate = m.d==="low" ? (m.t>0?Math.round(a/m.t*100):100) : (a>0?Math.round(a/m.t*100):0);
      if(rate<95 && rate>0) warnCount++;
    });
    var cls = warnCount>0?"r":"";
    qjHtml += '<a href="#s-'+g+'" class="'+cls+'">'+g+'</a>';
  });
  document.getElementById("qj").innerHTML = qjHtml;
  
  // 急需改善
  var warnItems = [];
  METRICS.forEach(function(m){
    var a=avg(rows,m.f);
    if(a===null)return;
    var rate = m.d==="low" ? (m.t>0?Math.round(a/m.t*100):100) : (a>0?Math.round(a/m.t*100):0);
    if(rate<95){
      warnItems.push({m:m,v:a,r:rate});
    }
  });
  warnItems.sort(function(a,b){return a.r-b.r;});
  
  if(warnItems.length>0){
    document.getElementById("warnSection").style.display="block";
    document.getElementById("warnList").innerHTML = '<h3>🔴 '+warnItems.length+'项未达标（达成率&lt;95%）</h3><div class="wi">'+
      warnItems.map(function(w){
        var m=w.m;var a=w.v;var r=w.r;
        var arrow = m.d==="low" ? "↓" : "↑";
        var display = a!==null ? (m.n.indexOf("率")>=0||m.n.indexOf("分")>=0?a.toFixed(1)+"%":a.toFixed(1)) : "-";
        return '<div class="ic"><div class="tl">🔴 '+m.n+'</div>'+
          '<div class="row"><span>当前值</span><span class="v r">'+display+'</span></div>'+
          '<div class="row"><span>目标🎯 '+arrow+m.t+(m.n.indexOf("率")>=0||m.n.indexOf("分")>=0?"%":"")+'</span><span class="v r">达成率 '+r+'%</span></div>'+
          '<div class="sg">'+(m.c)+' · 请重点关注改善</div></div>';
      }).join('')+'</div>';
  } else {
    document.getElementById("warnSection").style.display="none";
  }
  
  // 表头 - 日期列
  var allDates = [];
  rows.forEach(function(r){var d=r["数据日期"];if(allDates.indexOf(d)<0)allDates.push(d);});
  allDates.sort();
  
  var thr = document.getElementById("thr");
  thr.innerHTML = "<th>板块</th><th>指标</th><th>目标</th><th>月度达成</th><th>达成率</th>"+
    allDates.map(function(d){return "<th>"+d.slice(5)+"</th>";}).join("");
  
  // 表格数据
  var tbdHtml = "";
  Object.keys(GROUPS).forEach(function(g){
    var first = true;
    GROUPS[g].forEach(function(m){
      var a=avg(rows,m.f);
      var display = a!==null ? (m.n.indexOf("率")>=0||m.n.indexOf("分")>=0?a.toFixed(1)+"%":a.toFixed(1)) : "-";
      var rate = (a!==null && m.t>0) ? (m.d==="low"?Math.round(a/m.t*100):Math.round(a/m.t*100)) : null;
      var rateDisplay = rate!==null?rate+"%":"-";
      var rowBg = rate!==null&&rate<95?" style='background:#fff0f0'":"";
      var targetStr = (m.n.indexOf("率")>=0||m.n.indexOf("分")>=0)?m.t+"%":m.t;
      
      tbdHtml += "<tr"+rowBg+">";
      tbdHtml += "<td"+(first?" rowspan='"+GROUPS[g].length+"'":"")+">"+g+"</td>";
      tbdHtml += "<td>"+m.n+"</td><td>"+targetStr+"</td>";
      tbdHtml += "<td>"+display+"</td><td>"+rateDisplay+"</td>";
      
      // 每日数据
      allDates.forEach(function(d){
        var dayRows = rows.filter(function(r){return r["数据日期"]===d;});
        var dayVals = dayRows.map(function(r){return nv(r[m.f]);}).filter(function(v){return v!==null;});
        var dayA = dayVals.length?dayVals.reduce(function(a,b){return a+b;},0)/dayVals.length:null;
        var dayDisp = dayA!==null?(m.n.indexOf("率")>=0||m.n.indexOf("分")>=0?dayA.toFixed(1)+"%":dayA.toFixed(1)):"-";
        tbdHtml += "<td>"+dayDisp+"</td>";
      });
      tbdHtml += "</tr>";
      first = false;
    });
  });
  document.getElementById("tbd").innerHTML = tbdHtml;
}

document.getElementById("es").value = "__all__";
rf();
</script>
</body></html>
