<script>
// ========== DATA LOADING ==========
const RAW_DATA = typeof RAW !== 'undefined' ? RAW : [];
const groupData = RAW_DATA.filter(function(d){return d['上门组']==='成都上门二组'});
const groupNames = [...new Set(groupData.map(function(d){return d['员工姓名']}))].sort();
const allDates = [...new Set(groupData.map(function(d){return d['数据日期']}))].sort();
const latestDate = allDates.length > 0 ? allDates[allDates.length-1] : '';
const startDate = allDates.length > 0 ? allDates[0] : '';

document.getElementById('latestDate').textContent = latestDate ? '('+latestDate+')' : '';
document.getElementById('dateLine').textContent = '最新数据: ' + (latestDate ? latestDate.replace(/-/g,'/') : '');

// ========== VALUE PARSING ==========
function parseVal(v) {
  if (v===null||v===undefined||v===''||v==='null'||v==='undefined') return null;
  if (typeof v==='number') return v;
  var s = String(v).trim().replace(/,/g,'');
  var isPct = s.indexOf('%') >= 0;
  var num = parseFloat(s.replace(/%/g,''));
  if (isNaN(num)) return null;
  return isPct ? num/100 : num;
}

// ========== INDICATOR DEFINITIONS (19 items) ==========
var INDICATORS = [
  // section, name, field, target, higher, advice
  {section:'催单率', name:'催单率', field:'催单率-考核', target:0.02, higher:false,
   advice:'派单后尽快确认时间告知ETA，联系不上分时段跟进避免催单'},
  {section:'入库超时率', name:'入库超时率', field:'超时未入库量', target:0, higher:false,
   advice:'平峰期订单当日完成入库，高峰期16点前完成；入库前确认门店已扫码'},
  {section:'普通单过程数据', name:'跟进及时率', field:'跟进及时率-全渠道', target:0.95, higher:true,
   advice:'时效：9-12点订单9点前跟进，当天加单1h内跟进；未接通分时段持续跟进'},
  {section:'普通单过程数据', name:'企微回复及时率', field:'企微回复及时率-直营', target:0.85, higher:true,
   advice:'开启企微消息提醒，工作时间10-22点及时回复，非工作时间次日14点前回复'},
  {section:'普通单过程数据', name:'工单回复及时率', field:'工单30min回复及时率', target:0.90, higher:true,
   advice:'工单30分钟内及时回复，设置提醒避免超时；定期清理未读消息'},
  {section:'跟进及时率(到天)', name:'跟进及时率', field:'跟进及时率-全渠道', target:0.98, higher:true,
   advice:'到天监控确保日度达标，分时段跟进按时完成；定期盘查未接通订单'},
  {section:'加单率', name:'加单率', field:'加单率', target:0.085, higher:true,
   advice:'有差价务必做协商议价挽留，多渠道开口；跟进时提醒旧机+全品类回收'},
  {section:'ETA履约准时率', name:'ETA履约准时率', field:'多品类ETA履约准时率', target:0.98, higher:true,
   advice:'点"到达"前将订单改派至当前时间段确保时间准确；周末合理调整派单量'},
  {section:'一站式过程数据', name:'履约及时率', field:'京东一站换新履约及时率', target:0.925, higher:true,
   advice:'一二传当日完成交付，三传最迟次日，优先交付并引导当日成交'},
  {section:'一站式过程数据', name:'取货及时率', field:'京东一站换新取货及时率', target:0.96, higher:true,
   advice:'一传订单11点前取货，二传17点前取货；取货后及时更新系统状态'},
  {section:'一站式过程数据', name:'跟进及时率', field:'京东一站换新跟进及时率', target:0.98, higher:true,
   advice:'主品收货后1h内电话跟进告知到货并预约交付；拦截包裹也需跟进'},
  {section:'一站式过程数据', name:'旧机成交率', field:'一站换新旧机收货成交率', target:0.88, higher:true,
   advice:'主动挽留用户完成旧机回收才算成交；价格敏感用户可使用赚钱卡/叠加券'},
  {section:'交付用户添加率', name:'交付用户添加率', field:'交付用户添加率', target:0.88, higher:true,
   advice:'结算前让顾客扫码添加企微，利用质检报告和最终价格引导'},
  {section:'3C业务', name:'3C成交人效', field:'3C成交人效', target:10, higher:true,
   advice:'合理规划路线增加上门单量，验机前先报价，差异化标注价格谈判'},
  {section:'3C业务', name:'提交成交率', field:'3C上门提交成交率-用户维度(非一站换新)', target:0.78, higher:true,
   advice:'验机前先报价，差异订单标注"价格谈判"原因；运用竞争券/叠加券促成交'},
  {section:'服务质量', name:'员工服务分', field:'员工服务分-直营', target:4.5, higher:true,

   advice:'主动沟通避免用户不满，发生投诉第一时间响应处理并安抚用户'},
  {section:'服务质量', name:'隐私清除率', field:'隐私清除率', target:0.95, higher:true,
   advice:'上门服务后务必清除用户隐私数据，拍照留存确认；严格执行隐私清除流程'}
];

// ========== SECTION GROUPING ==========
var SECTIONS = [];
var secMap = {};
INDICATORS.forEach(function(ind,i){
  if(!secMap[ind.section]){
    secMap[ind.section] = {name:ind.section, indicators:[]};
    SECTIONS.push(secMap[ind.section]);
  }
  secMap[ind.section].indicators.push(ind);
});

// ========== HELPER FUNCTIONS ==========

// Average for an employee across all dates
function avgForEmp(emp, field) {
  var rows = groupData.filter(function(d){return d['员工姓名']===emp && d[field]!==null && d[field]!=='' && d[field]!=='null'});
  if (rows.length === 0) return null;
  var total = 0, count = 0;
  rows.forEach(function(r){
    var v = parseVal(r[field]);
    if (v !== null) { total += v; count++; }
  });
  return count > 0 ? total / count : null;
}

// Sum for an employee
function sumForEmp(emp, field) {
  var rows = groupData.filter(function(d){return d['员工姓名']===emp && d[field]!==null && d[field]!=='' && d[field]!=='null'});
  if (rows.length === 0) return null;
  var total = 0;
  rows.forEach(function(r){
    var v = parseVal(r[field]);
    if (v !== null) total += v;
  });
  return total;
}

// Daily value for an employee
function getEmpDaily(emp, field, date) {
  var row = groupData.find(function(d){return d['员工姓名']===emp && d['数据日期']===date});
  return row ? parseVal(row[field]) : null;
}

// Achievement rate
function calcAch(actual, target, higher) {
  if (actual === null || target === null) return null;
  if (target === 0) return actual === 0 ? 100 : 0;
  if (higher) return actual / target * 100;
  return actual === 0 ? 100 : target / actual * 100;
}

// Format value with appropriate unit
function fmtVal(v, field) {
  if (v === null || v === undefined) return '-';
  // For integer fields like 超时未入库量
  if (field === '超时未入库量' || field === '3C成交人效') {
    return v.toFixed(2);
  }
  // For percentage fields
  if (Math.abs(v) < 3 && v !== 0) return (v*100).toFixed(1)+'%';
  return v.toFixed(2);
}

function fmtPct(p) {
  if (p === null || p === undefined) return '-';
  return Math.round(p) + '%';
}

function pctCls(p) {
  if (p === null || p === undefined) return '';
  if (p >= 100) return 'pct-good';
  return 'pct-bad';
}

function valCls(ok) {
  return ok ? 'val-good' : 'val-bad';
}

function barCls(p) {
  if (p === null || p === undefined) return '';
  if (p >= 100) return 'bar-good';
  if (p >= 96) return 'bar-mid';
  return 'bar-bad';
}

function barW(p) {
  if (p === null || p === undefined) return 0;
  if (p < 0) return 0;
  if (p > 100) return 100;
  return p;
}

// Threshold for green/yellow/red
function rateCls(p) {
  if (p === null || p === undefined) return '';
  if (p >= 100) return 'status-good val-good';
  if (p >= 96) return 'status-mid val-warn';
  return 'status-bad val-bad';
}

// ========== BUILD DATA FOR AN EMPLOYEE ==========
function buildEmpData(person) {
  var items = [];
  INDICATORS.forEach(function(ind){
    var val = avgForEmp(person, ind.field);
    var pct = calcAch(val, ind.target, ind.higher);
    var ok = pct !== null && pct >= 100;
    var daily = allDates.map(function(d){
      var dv = getEmpDaily(person, ind.field, d);
      var dpct = calcAch(dv, ind.target, ind.higher);
      return {date: d, val: fmtVal(dv, ind.field), ok: dpct !== null && dpct >= 100, raw: dv};
    });
    items.push({
      section: ind.section,
      indicator: ind.name,
      field: ind.field,
      target: ind.target,
      higher: ind.higher,
      value: val,
      pct: pct,
      ok: ok,
      advice: ind.advice,
      daily: daily,
      displayTarget: (ind.higher?'≥':'≤') + (Math.abs(ind.target) < 3 ? (ind.target*100).toFixed(1)+'%' : ind.target.toFixed(2)),
      displayValue: fmtVal(val, ind.field)
    });
  });
  return items;
}

// ========== GROUP AVERAGE ==========
function groupAvg(field) {
  var total = 0, count = 0;
  groupNames.forEach(function(nm){
    var v = avgForEmp(nm, field);
    if (v !== null) { total += v; count++; }
  });
  return count > 0 ? total / count : null;
}

function groupDailyAvg(field, date) {
  var total = 0, count = 0;
  groupNames.forEach(function(nm){
    var v = getEmpDaily(nm, field, date);
    if (v !== null) { total += v; count++; }
  });
  return count > 0 ? total / count : null;
}

// ========== RANKING (加单率×50% + 3C人效×50%) ==========
function computeRanking() {
  return groupNames.map(function(name){
    var jd = avgForEmp(name, '加单率');
    var rx = avgForEmp(name, '3C成交人效');
    var jdS = jd !== null ? Math.min(jd/0.085*100, 100) : 0;
    var rxS = rx !== null ? Math.min(rx/10*100, 100) : 0;
    return {name: name, jd: jd, rx: rx, jdS: jdS, rxS: rxS, total: jdS*0.5 + rxS*0.5};
  }).sort(function(a,b){return b.total - a.total;});
}

      var hasD = false;
      groupNames.forEach(function(nm){
        var dailyVals = allDates.map(function(d){return getEmpDaily(nm, sec.indicators[0].field, d);});

      });
      if (!hasD) {
        allDates.forEach(function(d){ 
          var hasAny = groupNames.some(function(nm){return getEmpDaily(nm, sec.indicators[0].field, d) !== null;});
          if (hasAny) hasD = true;
        });
      }

    });
    h += '</tbody></table></div></div>';
  });

  document.getElementById('mainContent').innerHTML = h;
}

// ========== RENDER: SINGLE PERSON ==========
function renderSingle(person) {
  var items = buildEmpData(person);
  var h = '';

  // === Ranking card ===
  var rnkData = computeRanking();
  var myRank = null;
  for (var ri = 0; ri < rnkData.length; ri++) {
    if (rnkData[ri].name === person) { myRank = rnkData[ri]; break; }
  }
  if (myRank) {
    var rkCls = myRank.total >= 80 ? 'rank-top' : myRank.total >= 50 ? 'rank-mid' : 'rank-low';
    h += '<div class="summary-card" style="background:linear-gradient(135deg,#e8eaf6,#c5cae9);margin-bottom:12px;border:1px solid #9fa8da">';
    h += '<div class="sc-body" style="width:100%">';
    h += '<div class="sc-title" style="font-size:15px">🏆 核心指标排名 — <span class="'+rkCls+'">第'+(myRank?rnkData.indexOf(myRank)+1:'-')+'名 / 共'+rnkData.length+'人</span></div>';
    h += '<div class="sc-sub" style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-top:8px">';
    h += '<span><strong>综合得分：</strong><span class="'+rkCls+'" style="font-size:16px;font-weight:700">'+(myRank?myRank.total.toFixed(1):'-')+'分</span></span>';
    h += '<span style="display:inline-flex;align-items:center;gap:6px"><span style="white-space:nowrap">➕ '+(myRank.jd!==null?(myRank.jd*100).toFixed(2)+'%→'+myRank.jdS.toFixed(0)+'分':'-')+'</span><div class="progress-bar" style="width:60px;height:6px"><div class="progress-fill bar-good" style="width:'+(myRank.jdS*100/100)+'%;height:6px"></div></div></span>';
    h += '<span style="display:inline-flex;align-items:center;gap:6px"><span style="white-space:nowrap">💻 '+(myRank.rx!==null?myRank.rx.toFixed(2)+'→'+myRank.rxS.toFixed(0)+'分':'-')+'</span><div class="progress-bar" style="width:60px;height:6px"><div class="progress-fill bar-good" style="width:'+(myRank.rxS*100/100)+'%;height:6px"></div></div></span>';
    h += '</div></div></div>';
  }

  // === Summary card ===
  var good = items.filter(function(r){return r.pct !== null && r.pct >= 100;});
  var warn = items.filter(function(r){return r.pct !== null && r.pct >= 96 && r.pct < 100;});
  var bad = items.filter(function(r){return r.pct !== null && r.pct < 96;});
  var validPct = items.filter(function(r){return r.pct !== null;});
  var avgPct = validPct.length > 0 ? Math.round(validPct.reduce(function(a,b){return a + b.pct;}, 0) / validPct.length) : 0;
  var avatarCls = bad.length >= 3 ? 'bad' : (bad.length > 0 ? 'mid' : 'good');
  h += '<div class="summary-card">';
  h += '<div class="sc-avatar '+avatarCls+'">'+avgPct+'%</div>';
  h += '<div class="sc-body">';
  h += '<div class="sc-title">📊 '+person+' — 综合概览</div>';
  h += '<div class="sc-sub">共'+items.length+'项考核指标 · 平均达成率'+avgPct+'%</div>';
  h += '<div class="sc-stats">';
  h += '<div class="sc-stat"><span class="sc-stat-num good">'+good.length+'</span><span class="sc-stat-label">✅ 达标</span></div>';
  h += '<div class="sc-stat"><span class="sc-stat-num warn">'+warn.length+'</span><span class="sc-stat-label">🟡 临界</span></div>';
  h += '<div class="sc-stat"><span class="sc-stat-num bad">'+bad.length+'</span><span class="sc-stat-label">🔴 异常</span></div>';
  h += '</div>';
  h += '<div class="sc-bar-wrap"><div class="sc-bar-seg bad" style="width:'+Math.round(bad.length/items.length*100)+'%"></div><div class="sc-bar-seg warn" style="width:'+Math.round(warn.length/items.length*100)+'%"></div><div class="sc-bar-seg good" style="width:'+Math.round(good.length/items.length*100)+'%"></div></div>';
  h += '</div></div>';

  // === 急需改善模块：达成率 < 96% ===
  var badItems = items.filter(function(r){return r.pct !== null && r.pct < 96;});
  if (badItems.length > 0) {
    h += '<div class="alert-section">';
    h += '<div class="alert-title">🚨 急需改善 <span class="count">'+badItems.length+'项未达标（达成率&lt;95%）</span></div>';
    h += '<div class="alert-grid">';
    badItems.forEach(function(r){
      h += '<div class="alert-card">';
      h += '<div class="alert-card-header"><span class="alert-card-indicator">🔴 '+r.indicator+'</span><span class="alert-card-section">'+r.section+'</span></div>';
      h += '<div class="alert-card-values"><span class="current">'+r.displayValue+'</span><div><div class="target-label">目标</div><div class="target-val">🎯 '+r.displayTarget+'</div></div><div class="pct-badge">达成率 '+fmtPct(r.pct)+'</div></div>';
      if (r.advice) h += '<div class="alert-card-advice">'+r.advice+'</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // === 全部指标明细表 ===
  var hasDaily = items.some(function(r){return r.daily.some(function(d){return d.raw !== null;});});
  var dates = hasDaily ? allDates : [];
  
  h += '<div class="section"><div class="section-title">📋 '+person+' — 全部指标明细'+(items.length>0?'（共'+items.length+'项）':'')+'</div>';
  h += '<div class="table-wrap"><table class="agg-table"><thead><tr><th>板块</th><th>指标</th><th>目标</th><th>月度达成</th><th>达成率</th>';
  dates.forEach(function(d){h += '<th>'+d.slice(5)+'</th>';});
  h += '</tr></thead><tbody>';

  items.forEach(function(row){
    h += '<tr>';
    h += '<td style="color:#555;text-align:left;white-space:nowrap">'+row.section+'</td>';
    h += '<td style="color:#555;text-align:left;padding-left:12px">'+row.indicator+'</td>';
    h += '<td>'+row.displayTarget+'</td>';
    h += '<td class="'+(row.ok?'val-good':'val-bad')+'">'+row.displayValue+'</td>';
    h += '<td><div class="progress-bar"><div class="progress-fill '+barCls(row.pct)+'" style="width:'+barW(row.pct)+'%"></div></div><span class="pct-num '+pctCls(row.pct)+'">'+fmtPct(row.pct)+'</span></td>';
    if (hasDaily) {
      if (row.daily && row.daily.length > 0) {
        row.daily.forEach(function(d){
          h += '<td class="'+(d.raw !== null ? (d.ok ? '' : 'val-bad') : '')+'">'+(d.raw !== null ? d.val : '-')+'</td>';
        });
      } else {
        dates.forEach(function(){h += '<td>-</td>';});
      }
    }
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';

  document.getElementById('mainContent').innerHTML = h;
}

// ========== RENDER: GROUP OVERVIEW (cards) ==========
function renderGroupOverview() {
  var h = '';
  
  // 核心指标卡片
  h += '<div style="margin-bottom:24px"><div class="section-title" style="margin-bottom:12px">🏢 小组核心指标 <span style="font-size:13px;color:#999;font-weight:400">（成都上门二组期间KPI）</span></div>';
  h += '<div class="core-grid">';
  
  // Sort indicators by achievement rate (lowest first)
  var coreItems = INDICATORS.map(function(ind){
    var val = groupAvg(ind.field);
    var pct = calcAch(val, ind.target, ind.higher);
    return {indicator: ind.name, section: ind.section, value: val, target: ind.target, higher: ind.higher, pct: pct,
      displayValue: fmtVal(val, ind.field),
      displayTarget: (ind.higher?'≥':'≤')+(Math.abs(ind.target) < 3 && ind.target !== 0 ? (ind.target*100).toFixed(1)+'%' : ind.target.toFixed(2))
    };
  }).sort(function(a,b){return (a.pct||999) - (b.pct||999);});
  
  coreItems.forEach(function(c, idx){
    var cls = c.pct !== null && c.pct >= 100 ? 'core-good' : 'core-bad';
    h += '<div class="core-card '+cls+'">';
    h += '<div class="core-card-header">'+c.indicator+'</div>';
    h += '<div class="core-card-body">';
    h += '<div class="core-current">'+(c.value !== null ? c.displayValue : '-')+'</div>';
    h += '<div class="core-pct-wrap"><span class="core-pct">'+(c.pct !== null ? fmtPct(c.pct) : '-')+'</span><span class="core-pct-label">达成率</span></div>';
    h += '</div>';
    h += '<div class="core-card-footer">目标：'+c.displayTarget+'</div>';
    h += '</div>';
  });
  h += '</div></div>';

  // 日常运营指标卡片
  h += '<div style="margin-bottom:20px"><div class="section-title" style="margin-bottom:12px">📊 日常运营指标 <span style="font-size:13px;color:#999;font-weight:400">（达成率从低到高排序）</span></div><div class="cq-grid">';
  coreItems.forEach(function(c, idx){
    var st = c.pct !== null && c.pct >= 100 ? 'ok' : (c.pct !== null && c.pct >= 96 ? 'warning' : 'danger');
    var vv = c.value !== null ? c.displayValue : '-';
    h += '<div class="cq-card '+st+'" onclick="openCardDetail('+idx+')">';
    h += '<div class="cq-card-header"><div><div class="cq-card-name">'+c.indicator+'</div><div class="cq-card-section">'+c.section+'</div></div><div style="text-align:right;font-size:12px"><span class="'+(c.pct!==null&&c.pct>=100?'pct-good':'pct-bad')+'" style="font-weight:700;font-size:16px">'+(c.pct!==null?fmtPct(c.pct):'-')+'</span><br><span style="color:#999">达成率</span></div></div>';
    h += '<div class="cq-card-body"><span class="cq-card-value '+st+'">'+vv+'</span><div class="cq-card-meta">小组均值</div></div>';
    h += '<div class="cq-card-target">目标：<span>'+c.displayTarget+'</span></div>';
    h += '<div class="cq-card-hint">👆 点击查看人员明细 →</div>';
    h += '</div>';
  });
  h += '</div></div>';
  document.getElementById('mainContent').innerHTML = h;
  
  // Store card data for modal
  window._cardData = coreItems;
}

// ========== MODAL: Card detail (person breakdown) ==========
function openCardDetail(cardIdx) {
  var card = window._cardData[cardIdx];
  if (!card) return;
  
  var indName = card.indicator;
  var secName = card.section;
  
  document.getElementById('modalTitle').textContent = '📊 '+indName+' — 人员明细（'+secName+'）';
  
  // Find indicator definition
  var indDef = null;
  INDICATORS.forEach(function(ind){
    if (ind.name === indName && ind.section === secName) indDef = ind;
  });
  if (!indDef) return;
  
  var rows = [];
  groupNames.forEach(function(nm){
    var val = avgForEmp(nm, indDef.field);
    var pct = calcAch(val, indDef.target, indDef.higher);
    var ok = pct !== null && pct >= 100;
    var daily = allDates.map(function(d){
      var dv = getEmpDaily(nm, indDef.field, d);
      return {date: d, val: dv !== null ? fmtVal(dv, indDef.field) : '-', ok: dv !== null && calcAch(dv, indDef.target, indDef.higher) >= 100, raw: dv};
    });
    if (val !== null) {
      rows.push({name: nm, value: val, ok: ok, pct: pct, target: indDef.target, higher: indDef.higher, daily: daily,
        displayValue: fmtVal(val, indDef.field),
        displayTarget: (indDef.higher?'≥':'≤')+(Math.abs(indDef.target) < 3 && indDef.target !== 0 ? (indDef.target*100).toFixed(1)+'%' : indDef.target.toFixed(2))
      });
    }
  });
  
  // Sort by achievement (worst first)
  rows.sort(function(a,b){return (a.pct||999) - (b.pct||999);});
  
  var hasDaily = rows.some(function(r){return r.daily.some(function(d){return d.raw !== null;});});
  var dates = hasDaily ? allDates : [];
  
  var h = '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>';
  h += '<th style="text-align:left;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">排名</th>';
  h += '<th style="text-align:left;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">人员</th>';
  h += '<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">目标</th>';
  h += '<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">期间达成</th>';
  h += '<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">达成率</th>';
  dates.forEach(function(d){h += '<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">'+d.slice(5)+'</th>';});
  h += '</tr></thead><tbody>';
  
  rows.forEach(function(r, idx){
    var cls = r.pct < 96 ? 'val-bad' : (r.pct < 100 ? 'val-warn' : 'val-ok');
    h += '<tr style="border-bottom:1px solid #eee">';
    h += '<td style="padding:8px 10px;text-align:center;font-weight:600;color:#'+(idx<3?(r.pct<96?'c62828':'e65100'):'#999')+'">'+(idx+1)+'</td>';
    h += '<td style="padding:8px 10px;font-weight:500">'+r.name+'</td>';
    h += '<td style="padding:8px 10px;text-align:center;color:#666">'+r.displayTarget+'</td>';
    h += '<td style="padding:8px 10px;text-align:center;'+cls+'">'+r.displayValue+'</td>';
    h += '<td style="padding:8px 10px;text-align:center"><span class="'+(r.pct>=100?'pct-good':'pct-bad')+'" style="font-weight:700">'+(r.pct!==null?fmtPct(r.pct):'-')+'</span></td>';
    if (hasDaily) {
      if (r.daily && r.daily.length > 0) {
        r.daily.forEach(function(d){
          h += '<td style="padding:8px 10px;text-align:center;'+(d.raw !== null ? (d.ok ? '' : 'val-bad') : '')+'">'+(d.raw !== null ? d.val : '-')+'</td>';
        });
      } else {
        dates.forEach(function(){h += '<td style="padding:8px 10px;text-align:center">-</td>';});
      }
    }
    h += '</tr>';
  });
  h += '</tbody></table>';
  
  // Summary
  h += '<div style="margin-top:16px;padding:12px 16px;background:#f5f5f5;border-radius:8px;font-size:13px">';
  h += '<strong>📋 小组汇总：</strong> 共 '+rows.length+' 人 | ';
  var okCount = rows.filter(function(r){return r.pct >= 95;}).length;
  h += '<span style="color:#2e7d32;font-weight:600">'+okCount+'人达标(≥95%)</span> | ';
  h += '<span style="color:#c62828;font-weight:600">'+(rows.length-okCount)+'人未达标(<95%)</span> | ';
  h += '小组均值：<strong>'+(card.value !== null ? card.displayValue : '-')+'</strong> (达成率 '+(card.pct !== null ? fmtPct(card.pct) : '-')+')';
  h += '</div>';
  
  document.getElementById('modalBody').innerHTML = h;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
}
function closeModal2(e){
  if(e && e.target !== document.getElementById('modalOverlay2')) return;
  document.getElementById('modalOverlay2').classList.remove('show');
}

// ========== NAV ==========
function renderNav() {
  var bar = document.getElementById('navBar');
  bar.innerHTML = '<span class="label">⚡ 快速跳转：</span>';
  SECTIONS.forEach(function(sec){
    var btn = document.createElement('button');
    btn.textContent = sec.name;
    btn.onclick = function(){
      var el = document.getElementById('sec_'+sec.name);
      if (el) {
        el.scrollIntoView({behavior:'smooth',block:'start'});
        document.querySelectorAll('#navBar button').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        setTimeout(function(){btn.classList.remove('active');}, 2000);
      }
    };
    bar.appendChild(btn);
  });
}

// ========== VIEW MANAGEMENT ==========
function render() {
  var v = document.getElementById('personSelect').value;
  if (!v) {
    document.getElementById('personInfo').textContent = '全部（按板块查看）';
    document.getElementById('navBar').style.display = 'flex';
    renderNav();
    renderSections();
  } else if (v === '__GROUP__') {
    document.getElementById('navBar').style.display = 'none';
    document.getElementById('personInfo').textContent = '成都上门二组 — 按指标达标率排序（越差越前）';
    renderGroupOverview();
  } else {
    document.getElementById('navBar').style.display = 'none';
    document.getElementById('personInfo').textContent = '已筛选：'+v;
    renderSingle(v);
  }
}

// ========== INIT ==========
var sel = document.getElementById('personSelect');
sel.innerHTML = '';
var allOpt = document.createElement('option'); allOpt.value = ''; allOpt.textContent = '📋 全部（按板块查看）'; allOpt.selected = true; sel.appendChild(allOpt);
var groupOpt = document.createElement('option'); groupOpt.value = '__GROUP__'; groupOpt.textContent = '🏙️ 成都上门二组（指标总览）'; sel.appendChild(groupOpt);
groupNames.forEach(function(n){
  var o = document.createElement('option');
  o.value = n; o.textContent = n; sel.appendChild(o);
});
sel.addEventListener('change', render);
render();
</script>
</body>
